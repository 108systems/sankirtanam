services:
  books:
    container_name: books
    build: .
    restart: always
    ports:
      - "3108:3108"
    volumes:
      - ./data:/data/books:ro
    environment:
      - BOOKS_DATA_DIR=/data/books
      - BOOKS_WARM_LANGS=eng,rus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
